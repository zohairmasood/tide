<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tide · Opportunity Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#F4F3EF;font-family:'Schibsted Grotesk',system-ui,sans-serif;color:#17171C;-webkit-font-smoothing:antialiased}
  button,select,input{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#d9d7cf;border-radius:6px;border:2px solid #F4F3EF}
  ::-webkit-scrollbar-track{background:transparent}
  @keyframes tidepulse{0%{box-shadow:0 0 0 0 rgba(22,128,143,.5)}70%{box-shadow:0 0 0 5px rgba(22,128,143,0)}100%{box-shadow:0 0 0 0 rgba(22,128,143,0)}}
  @keyframes toastin{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
  .modalbg{position:fixed;inset:0;background:rgba(20,20,20,.4);display:none;align-items:flex-start;justify-content:center;z-index:80;padding:40px 16px;overflow:auto}
  .modalbg.show{display:flex}
</style>
</head>
<body>
<div id="app"></div>
<div class="modalbg" id="modal" onclick="if(event.target===this)closeModal()"><div id="modalBox" style="background:#fff;border:1px solid #E8E6DF;border-radius:16px;max-width:560px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.18)"></div></div>

<script>
"use strict";
// ============================================================================
// Tide — LIVE dashboard, in the Claude Design visual language, wired to the
// real FastAPI backend. Conviction = calibrated P(+10% in 1-2d), Downside floor
// = P(no breach of entry over ~3wk), Score = activity composite. The honesty
// contract is preserved: probabilities show "model est.", are SUPPRESSED when
// the model isn't display-validated or live data is insufficient, and paper
// trading is clearly simulated. See the trust badge for Brier / base rate.
// ============================================================================
const API = location.protocol === "file:" ? "http://localhost:8000" : location.origin;
const WS = API.replace(/^http/, "ws") + "/ws/leaderboard";
const ACCENT = '#16808F', ACCENT_SOFT = '#E2EFF1', CONV_THRESHOLD = 60;

const S = {
  view: 'scanner', rows: [], payload: {}, calib: null, portfolio: null,
  selectedId: null, watch: JSON.parse(localStorage.getItem('tide.watch') || '[]'),
  alerts: JSON.parse(localStorage.getItem('tide.alerts') || '[]'),
  toasts: [], clock: '', lastBySym: {},
  form: { stock: '', type: 'priceBelow', value: '' },
};
const saveWatch = () => localStorage.setItem('tide.watch', JSON.stringify(S.watch));
const saveAlerts = () => localStorage.setItem('tide.alerts', JSON.stringify(S.alerts));

// ---- helpers ----
const fp = p => '$' + (p == null ? '–' : p.toFixed(2));
const fpct = x => (x >= 0 ? '+' : '') + x.toFixed(2) + '%';
const dirColor = x => x >= 0 ? '#11A06B' : '#E0504F';
const convColor = c => c == null ? '#A0A0A8' : c >= 75 ? '#0E8C5A' : c >= 60 ? '#16808F' : c >= 45 ? '#C98A1E' : '#A0A0A8';
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
function hashColors(t) {
  const pal = [['#E3F0F2', '#0E6B78'], ['#EAE6F8', '#5B43B5'], ['#E7F2E8', '#1F7A45'], ['#FBEAE3', '#B5552B'], ['#E5EEFA', '#27518F'], ['#F7E9F0', '#9E3267'], ['#FCF1DC', '#9A6B12'], ['#E6F1F6', '#2A6E8E']];
  let h = 0; for (let i = 0; i < t.length; i++) h = (h * 31 + t.charCodeAt(i)) % pal.length; return pal[h];
}
function spark(hist, W, H) {
  if (!hist || hist.length < 2) return '';
  const lo = Math.min(...hist), hi = Math.max(...hist), r = hi - lo || 1;
  return hist.map((p, i) => (i / (hist.length - 1) * W).toFixed(1) + ',' + (H - 3 - (p - lo) / r * (H - 6)).toFixed(1)).join(' ');
}
// honesty gate: only treat a probability as displayable when the model is
// display-validated AND this row has sufficient live data.
const trustworthy = () => !!(S.calib && S.calib.available && S.calib.trustworthy);
function gated(row) { const p = row.prediction || {}; return trustworthy() && p.available && p.data_sufficient && p.p_pop != null; }
const conv = row => gated(row) ? row.prediction.p_pop * 100 : null;       // P(pop) %
const floorVal = row => gated(row) ? (row.prediction.p_safe ?? 0) * 100 : null; // P(safe) %
const baseRate = () => { try { return S.calib.validation.pop.base_rate * 100; } catch (e) { return null; } };

// ============================ data ============================
function applyAlerts() {
  const fired = [];
  S.alerts = S.alerts.map(al => {
    if (!al.armed || al.triggered) return al;
    const r = S.lastBySym[al.stock]; if (!r) return al;
    const c = conv(r); let hit = false;
    if (al.type === 'priceAbove') hit = r.last >= al.value;
    else if (al.type === 'priceBelow') hit = r.last <= al.value;
    else if (al.type === 'convAbove') hit = c != null && c >= al.value;
    if (hit) { fired.push({ ...al, px: r.last }); return { ...al, triggered: true }; }
    return al;
  });
  if (fired.length) {
    saveAlerts();
    fired.forEach(f => pushToast(f.stock + ' alert triggered', condText(f) + ' — now ' + fp(f.px)));
  }
}
function ingest(payload) {
  S.payload = payload; S.rows = payload.rows || [];
  S.rows.forEach(r => { S.lastBySym[r.symbol] = r; });
  if (!S.selectedId && S.rows[0]) S.selectedId = S.rows[0].symbol;
  applyAlerts();
  if (S.view === 'scanner') renderView();
  else if (S.view === 'watch') renderView();
  else if (S.view === 'alerts') { const l = document.getElementById('alertList'); if (l) l.innerHTML = alertsListHTML(); }
}
function loadCalib() {
  fetch(API + '/api/calibration').then(r => r.json()).then(d => { S.calib = d; renderTrust(); if (S.view === 'scanner') renderView(); }).catch(() => {});
}
function loadPortfolio() {
  fetch(API + '/api/paper/portfolio').then(r => r.json()).then(d => {
    S.portfolio = d; renderTrust();
    if (S.view === 'paper') { const b = document.getElementById('paperBody'); if (b) b.innerHTML = paperBodyHTML(); }
  }).catch(() => {});
}
function pushToast(title, body) {
  const id = 'to' + Math.random(); S.toasts = [{ id, title, body }, ...S.toasts].slice(0, 4); renderToasts();
  setTimeout(() => { S.toasts = S.toasts.filter(t => t.id !== id); renderToasts(); }, 5200);
}
function condText(a) {
  if (a.type === 'priceAbove') return 'Price above ' + fp(a.value);
  if (a.type === 'priceBelow') return 'Price at/below ' + fp(a.value);
  return 'Conviction above ' + Math.round(a.value) + '%';
}
function featured() { return S.rows.find(r => r.symbol === S.selectedId) || S.rows[0] || null; }

// ============================ header ============================
function headerHTML() {
  const nav = (v, label, badge) => {
    const on = S.view === v;
    return `<button data-act="go" data-v="${v}" style="border:none;cursor:pointer;font-size:13px;font-weight:600;padding:7px 15px;border-radius:8px;background:${on ? '#fff' : 'transparent'};color:${on ? '#17171C' : '#7A7982'};box-shadow:${on ? '0 1px 2px rgba(0,0,0,.08)' : 'none'};display:flex;align-items:center;gap:6px">${label}${badge || ''}</button>`;
  };
  const triggered = S.alerts.filter(a => a.triggered).length;
  const aBadge = triggered ? `<span style="background:#E0504F;color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 6px;font-family:'JetBrains Mono',monospace">${triggered}</span>` : '';
  const live = !!S.payload.ts;
  return `<header style="position:sticky;top:0;z-index:40;background:rgba(244,243,239,.88);backdrop-filter:blur(12px);border-bottom:1px solid #E4E2DA">
    <div style="max-width:1340px;margin:0 auto;padding:0 28px;height:62px;display:flex;align-items:center;gap:24px">
      <div style="display:flex;align-items:center;gap:11px">
        <div style="width:31px;height:31px;border-radius:9px;background:${ACCENT};display:flex;align-items:center;justify-content:center">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M2 14c2.5 0 2.5-3 5-3s2.5 3 5 3 2.5-3 5-3 2.5 3 5 3" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 19c2.5 0 2.5-3 5-3s2.5 3 5 3 2.5-3 5-3 2.5 3 5 3" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".5"/></svg>
        </div>
        <div style="font-weight:800;font-size:19px;letter-spacing:-.03em">Tide</div>
      </div>
      <nav style="display:flex;gap:3px;background:#ECEAE2;padding:4px;border-radius:11px">${nav('scanner', 'Scanner')}${nav('watch', 'Watchlist')}${nav('alerts', 'Alerts', aBadge)}${nav('paper', 'Paper')}</nav>
      <div style="flex:1"></div>
      <div id="trustBadge"></div>
      <div style="display:flex;align-items:center;gap:7px;font-size:12.5px;color:#5C5B64;font-weight:500">
        <span style="width:8px;height:8px;border-radius:50%;background:${live ? '#11A06B' : '#B7B6AE'};animation:${live ? 'tidepulse 2s infinite' : 'none'}"></span>
        <span id="clock" style="font-family:'JetBrains Mono',monospace;letter-spacing:-.01em">${S.clock}</span>
      </div>
      <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#22323a,#4a6b74);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px">AD</div>
    </div>
  </header>`;
}
function renderTrust() {
  const el = document.getElementById('trustBadge'); if (!el) return;
  const c = S.calib;
  let label, color, bd;
  if (!c || !c.available) { label = 'model: none'; color = '#C98A1E'; bd = 'rgba(201,138,30,.4)'; }
  else {
    const b = (c.validation && c.validation.pop) ? c.validation.pop.brier : null;
    label = (c.synthetic ? 'synthetic · ' : '') + 'Brier ' + (b == null ? '–' : b);
    color = c.trustworthy && !c.synthetic ? '#0E6B78' : '#C98A1E';
    bd = c.trustworthy && !c.synthetic ? 'rgba(22,128,143,.35)' : 'rgba(201,138,30,.4)';
  }
  const eq = S.portfolio ? ' · paper $' + Math.round(S.portfolio.equity).toLocaleString() : '';
  el.innerHTML = `<button data-act="trust" style="border:1px solid ${bd};background:#fff;color:${color};font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:20px;cursor:pointer">${esc(label)}${eq}</button>`;
}

// ============================ scanner ============================
function bannerHTML() {
  if (!S.calib) return '';
  if (!S.calib.available) return banner('No trained model loaded — ranking by activity score; probabilities are hidden until a calibrated model is trained.');
  if (S.calib.synthetic) return banner('Running on a <b>synthetic</b> model — probabilities demonstrate the pipeline, not real forecasts.');
  if (!S.calib.trustworthy) return banner('Model present but below display-quality calibration — showing the activity score instead of headline probabilities.');
  return '';
}
function banner(msg) { return `<div style="background:rgba(201,138,30,.08);border:1px solid rgba(201,138,30,.25);border-radius:12px;padding:11px 15px;font-size:12.5px;color:#9A6B12;margin-bottom:16px;line-height:1.5">${msg}</div>`; }

function scannerHTML() {
  const rows = S.rows;
  const qualified = rows.filter(r => { const c = conv(r); return c != null && c >= CONV_THRESHOLD; }).length;
  const f = featured();
  if (!rows.length) {
    return `${bannerHTML()}<div style="background:#fff;border:1px dashed #DAD8D0;border-radius:16px;padding:54px;text-align:center;color:#9C9CA6"><div style="font-size:15px;font-weight:600;color:#6E6E78;margin-bottom:4px">No names currently clear the filters</div><div style="font-size:13px">That's expected — genuine +10% moves in 1–2 days are rare. Waiting for the next scan…</div></div>`;
  }
  const rowHTML = rows.map((s, i) => {
    const [bg, fg] = hashColors(s.symbol);
    const watched = S.watch.includes(s.symbol), top3 = i < 3;
    const c = conv(s), fl = floorVal(s);
    const pgr = s.prediction && s.prediction.potential_growth_pct;
    const convCell = c == null
      ? `<span style="font-size:11.5px;color:#A0A0A8">n/a · activity rank</span>`
      : `<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:#F0EEE7;border-radius:4px;overflow:hidden;min-width:60px"><div style="height:100%;border-radius:4px;width:${Math.round(c)}%;background:${convColor(c)}"></div></div><span style="font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:700;color:${convColor(c)};min-width:34px">${Math.round(c)}%</span><span style="font-size:11px;color:#11A06B">${c >= CONV_THRESHOLD ? '✓' : ''}</span></div>`;
    const sm = s.smart_money && s.smart_money.available && s.smart_money.net ? `<span title="net congressional buys" style="margin-left:6px;font-size:10px;font-weight:700;color:${s.smart_money.net > 0 ? '#0E8C5A' : '#E0504F'}">${s.smart_money.net > 0 ? '▲' : '▼'}${Math.abs(s.smart_money.net)}</span>` : '';
    return `<tr data-act="select" data-id="${s.symbol}" style="border-top:1px solid #F1EFE8;cursor:pointer;background:${f && f.symbol === s.symbol ? ACCENT_SOFT : 'transparent'}">
      <td style="padding:13px 12px 13px 20px"><span style="display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;padding:0 6px;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;background:${top3 ? ACCENT_SOFT : '#F1EFE8'};color:${top3 ? ACCENT : '#8B8A93'}">${i + 1}</span></td>
      <td style="padding:13px 12px"><div style="display:flex;align-items:center;gap:10px"><div style="width:30px;height:30px;border-radius:8px;background:${bg};color:${fg};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">${esc(s.symbol.slice(0, 2))}</div><div><div style="font-size:13.5px;font-weight:700;letter-spacing:-.01em">${esc(s.symbol)}${sm}</div><div style="font-size:11.5px;color:#9C9CA6">${esc(s.sector)}</div></div></div></td>
      <td style="padding:13px 12px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:${dirColor(s.session_pct)}">${fp(s.last)}</td>
      <td style="padding:13px 12px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600;color:${dirColor(s.session_pct)}">${fpct(s.session_pct)}</td>
      <td style="padding:13px 12px;min-width:150px">${convCell}</td>
      <td style="padding:13px 12px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600;color:#11A06B">${pgr == null ? 'n/a' : '~' + pgr + '%'}</td>
      <td style="padding:13px 12px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600;color:${fl == null ? '#A0A0A8' : fl >= 55 ? '#11A06B' : '#C98A1E'}">${fl == null ? 'n/a' : Math.round(fl) + '%'}</td>
      <td style="padding:13px 12px;text-align:center"><svg width="78" height="26" viewBox="0 0 78 26" preserveAspectRatio="none" style="display:block;margin:0 auto"><polyline points="${spark(s.sparkline, 78, 26)}" fill="none" stroke="${s.session_pct >= 0 ? '#11A06B' : '#E0504F'}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/></svg></td>
      <td style="padding:13px 12px;text-align:right"><span style="display:inline-block;min-width:34px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${s.composite >= 60 ? '#fff' : '#5C5B64'};background:${s.composite >= 60 ? ACCENT : '#EEECE5'};padding:3px 8px;border-radius:7px">${Math.round(s.composite)}</span></td>
      <td style="padding:13px 20px 13px 12px;text-align:right"><button data-act="watch" data-id="${s.symbol}" title="Toggle watchlist" style="border:none;background:none;cursor:pointer;font-size:16px;color:${watched ? '#E0A92E' : '#C9C7C0'};padding:2px">${watched ? '★' : '☆'}</button></td>
    </tr>`;
  }).join('');

  return `${bannerHTML()}
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap">
      <div>
        <div style="font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:${ACCENT};margin-bottom:5px">Real-time opportunity scan</div>
        <h1 style="margin:0;font-size:27px;font-weight:800;letter-spacing:-.025em">Prospective Leaderboard</h1>
        <p style="margin:6px 0 0;font-size:13.5px;color:#6E6E78;max-width:600px;line-height:1.5">Ranked by a calibrated <strong style="color:#43424A">conviction of +10% inside 24–48h</strong>, gated by a downside-floor confidence that price holds above entry for ~3 weeks. Conviction and floor are <b>model estimates</b> — see the trust badge.</p>
      </div>
      <div style="display:flex;gap:18px;align-items:center">
        <div style="text-align:right"><div style="font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:${ACCENT};line-height:1">${trustworthy() ? qualified : '—'}</div><div style="font-size:11px;color:#8B8A93;font-weight:600;letter-spacing:.03em;text-transform:uppercase">Qualified signals</div></div>
        <div style="width:1px;height:38px;background:#E4E2DA"></div>
        <div style="text-align:right"><div style="font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1">${(S.payload.model_loaded === false) ? '—' : rows.length}</div><div style="font-size:11px;color:#8B8A93;font-weight:600;letter-spacing:.03em;text-transform:uppercase">Live signals</div></div>
      </div>
    </div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin:0 0 16px;padding:11px 15px;background:#FAF9F6;border:1px solid #EEECE5;border-radius:11px;font-size:11.5px;color:#8B8A93;line-height:1.45">
      <span><b style="color:#43424A">Conviction</b> — calibrated probability of a <b>+10% move within 1–2 days</b>.</span>
      <span><b style="color:#43424A">48h potential</b> — estimated favorable move over ~48h, from the stock's recent volatility (an estimate of size, not a promise).</span>
      <span><b style="color:#43424A">Floor</b> — confidence the price <b>stays above ~5% below your entry</b> for ~3 weeks (downside protection).</span>
    </div>
    ${f ? featuredHTML(f) : ''}
    <div style="background:#fff;border:1px solid #E8E6DF;border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.03);overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid #EEECE5;flex-wrap:wrap;gap:10px">
        <div style="display:flex;align-items:center;gap:10px"><span style="font-size:14px;font-weight:700">Live leaderboard</span><span style="font-size:11px;font-weight:600;color:${ACCENT};background:${ACCENT_SOFT};padding:3px 9px;border-radius:20px">top ${rows.length}</span></div>
        <span style="font-size:11.5px;color:#9C9CA6">last full scan ${ago(S.payload.last_screen_ts)} ago</span>
      </div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:920px">
        <thead><tr style="background:#FAF9F6">
          ${['#', 'Symbol', 'Price', '24h', 'Conviction', '48h potential', 'Floor', '7d', 'Score', ''].map((h, i) => `<th style="text-align:${i <= 1 || i === 4 ? 'left' : i === 7 || i === 8 && false ? 'center' : 'right'};padding:11px ${i === 0 ? '12px 11px 20px' : i === 9 ? '11px 20px 11px 12px' : '12px'};font-size:11px;font-weight:600;color:#9C9CA6;letter-spacing:.04em;text-transform:uppercase">${h}</th>`).join('')}
        </tr></thead>
        <tbody>${rowHTML}</tbody>
      </table></div>
    </div>
    ${footerHTML()}`;
}

function featuredHTML(f) {
  const [bg, fg] = hashColors(f.symbol);
  const fwatched = S.watch.includes(f.symbol);
  const c = conv(f), fl = floorVal(f), br = baseRate();
  const pg = f.prediction && f.prediction.potential_growth_pct;
  const armable = gated(f) && (f.prediction.safe_gate_passed !== false);
  const gauges = [
    { label: 'Conviction', val: c == null ? 'n/a' : Math.round(c) + '%', vc: convColor(c), pct: c == null ? 0 : Math.round(c), color: convColor(c), detail: c == null ? 'Suppressed — model not display-validated or insufficient live data.' : 'Calibrated probability of a +10% move within 1–2 days' + (br ? ' · ' + (c / br).toFixed(1) + '× the ' + Math.round(br) + '% base rate' : '') },
    { label: 'Potential growth · next 48h', val: pg == null ? 'n/a' : '~' + pg + '%', vc: '#11A06B', pct: pg == null ? 0 : Math.min(100, pg * 8), color: '#11A06B', detail: 'Estimated favorable move over ~48h from recent volatility (daily σ × √2). An estimate of size — not a promise.' },
    { label: 'Downside floor', val: fl == null ? 'n/a' : Math.round(fl) + '%', vc: fl == null ? '#A0A0A8' : fl >= 55 ? '#11A06B' : '#C98A1E', pct: fl == null ? 0 : Math.round(fl), color: fl == null ? '#D9D7CF' : fl >= 55 ? '#11A06B' : '#C98A1E', detail: 'Confidence the price stays at/above ~5% below your entry for the next ~3 weeks — i.e. the downside holds.' },

          ${f.catalyst_note ? `<div style="font-size:12px;color:#9E3267;margin-top:4px">${esc(f.catalyst_note)}</div>` : ''}</div></div>
        <div style="text-align:right"><div style="font-family:'JetBrains Mono',monospace;font-size:23px;font-weight:700;line-height:1;color:${dirColor(ch)}">${fp(f.last)}</div><div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;margin-top:3px;color:${dirColor(ch)}">${fpct(ch)}</div></div>

    <p style="margin:0 0 20px;font-size:13.5px;color:#6E6E78">${S.watch.length} symbol${S.watch.length === 1 ? '' : 's'} tracked (saved in this browser) — tap a card to open it in the scanner.</p>

  const rc = d.return_pct >= 0 ? '#11A06B' : '#E0504F';
  const stat = (l, v, c) => `<div style="background:#FAF9F6;border-radius:11px;padding:13px 15px"><div style="font-size:10.5px;color:#9C9CA6;font-weight:600;text-transform:uppercase;letter-spacing:.03em">${l}</div><div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;margin-top:3px;color:${c || '#17171C'}">${v}</div></div>`;

  const closed = (d.closed_trades || []).slice().reverse().map(t => `<tr style="border-top:1px solid #F1EFE8"><td style="padding:10px 12px 10px 20px;font-weight:700;font-size:12.5px">${esc(t.symbol)}</td><td style="padding:10px 12px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px">$${t.entry_price}→$${t.exit_price}</td><td style="padding:10px 12px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;color:${t.pnl >= 0 ? '#11A06B' : '#E0504F'}">${t.pnl >= 0 ? '+' : ''}$${t.pnl}</td><td style="padding:10px 12px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;color:${t.pnl >= 0 ? '#11A06B' : '#E0504F'}">${t.pnl_pct}%</td><td style="padding:10px 20px 10px 12px;text-align:right;font-size:11.5px;color:#8B8A93">${esc(t.reason)}</td></tr>`).join('');
  return `<div style="background:rgba(201,138,30,.08);border:1px solid rgba(201,138,30,.22);border-radius:12px;padding:11px 15px;font-size:12px;color:#9A6B12;margin-bottom:16px;line-height:1.5"><b>SIMULATED</b> — fills are modeled against live prices at last trade ± ${d.slippage_bps}bps slippage. Not a brokerage; this is honest forward-validation of the model, not real trading.</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px">
      ${stat('Equity', '$' + d.equity.toLocaleString())}${stat('Total return', (d.return_pct >= 0 ? '+' : '') + d.return_pct + '%', rc)}${stat('Cash', '$' + d.cash.toLocaleString())}${stat('Realized P&L', (d.realized_pnl >= 0 ? '+' : '') + '$' + d.realized_pnl, d.realized_pnl >= 0 ? '#11A06B' : '#E0504F')}${stat('Win rate', d.win_rate != null ? d.win_rate + '%' : '–')}
    </div>
    <div style="background:#fff;border:1px solid #E8E6DF;border-radius:16px;overflow:hidden;margin-bottom:18px;box-shadow:0 1px 2px rgba(0,0,0,.03)">
      <div style="padding:14px 20px;border-bottom:1px solid #EEECE5;font-size:13.5px;font-weight:700">Open positions</div>
      ${open ? `<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#FAF9F6">${['Symbol', 'Entry', 'Last', 'Unrl', 'Tgt / Stop', ''].map((h, i) => `<th style="text-align:${i === 0 ? 'left' : 'right'};padding:10px ${i === 0 ? '12px 10px 20px' : '12px'};font-size:10.5px;color:#9C9CA6;text-transform:uppercase;font-weight:600">${h}</th>`).join('')}</tr></thead><tbody>${open}</tbody></table>` : '<div style="padding:24px 20px;color:#9C9CA6;font-size:13px">None open — arm a pick from the Scanner.</div>'}

      <div style="padding:14px 20px;border-bottom:1px solid #EEECE5;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13.5px;font-weight:700">Closed trades</span><button data-act="resetPaper" style="border:1px solid #E0DED5;background:#fff;color:#8B8A93;font-size:11px;font-weight:600;padding:5px 11px;border-radius:7px;cursor:pointer">Reset</button></div>
      ${closed ? `<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#FAF9F6">${['Symbol', 'Entry→Exit', 'P&L', '%', 'Why'].map((h, i) => `<th style="text-align:${i === 0 ? 'left' : 'right'};padding:10px ${i === 0 ? '12px 10px 20px' : i === 4 ? '10px 20px 10px 12px' : '12px'};font-size:10.5px;color:#9C9CA6;text-transform:uppercase;font-weight:600">${h}</th>`).join('')}</tr></thead><tbody>${closed}</tbody></table>` : '<div style="padding:24px 20px;color:#9C9CA6;font-size:13px">No closed trades yet.</div>'}
    </div>`;
}

function renderToasts() {
  let el = document.getElementById('toasts');
  if (!el) { el = document.createElement('div'); el.id = 'toasts'; el.style.cssText = 'position:fixed;top:74px;right:22px;z-index:90;display:flex;flex-direction:column;gap:10px;width:300px'; document.body.appendChild(el); }
  el.innerHTML = S.toasts.map(t => `<div style="background:#fff;border:1px solid #E8E6DF;border-left:3px solid ${ACCENT};border-radius:12px;padding:12px 14px;box-shadow:0 8px 24px rgba(20,20,20,.1);animation:toastin .25s ease"><div style="font-size:12.5px;font-weight:700;color:#17171C;margin-bottom:2px">${esc(t.title)}</div><div style="font-size:12px;color:#6E6E78;line-height:1.4">${esc(t.body)}</div></div>`).join('');
}
const ago = ts => { if (!ts) return '–'; const s = Math.max(0, Math.round(Date.now() / 1000 - ts)); return s < 90 ? s + 's' : Math.round(s / 60) + 'm'; };

let tvSym = null;
function mountTV() {
  const slot = document.querySelector('.tv-slot'); if (!slot) return;
  const sym = slot.dataset.sym; if (slot.dataset.loaded === sym) return;
  slot.dataset.loaded = sym; slot.innerHTML = '<div class="tradingview-widget-container" style="height:100%;width:100%"><div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div></div>';
  const sc = document.createElement('script');
  sc.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js'; sc.async = true;
  sc.innerHTML = JSON.stringify({ symbol: sym, interval: 'D', theme: 'light', style: '1', locale: 'en', autosize: true, hide_top_toolbar: true, hide_legend: false, allow_symbol_change: false });
  slot.querySelector('.tradingview-widget-container').appendChild(sc);
}

// ============================ modal (analyst / history / trust) ============================
function openModal(html) { document.getElementById('modalBox').innerHTML = `<span onclick="closeModal()" style="float:right;cursor:pointer;color:#BDBBB4;font-family:'JetBrains Mono',monospace;font-size:12px">close ✕</span>` + html; document.getElementById('modal').classList.add('show'); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }
window.closeModal = closeModal;
function trustModal() {
  const c = S.calib; let h = `<h3 style="margin:0 0 10px;font-size:16px">Model trust</h3>`;
  if (!c || !c.available) { h += `<p style="color:#6E6E78;font-size:13px">No trained model is loaded — the leaderboard is ranking by the activity score and probabilities are hidden.</p>`; return openModal(h); }
  const v = c.validation || {}, pop = v.pop || {}, safe = v.safe || {};
  h += `<p style="font-size:12.5px;color:#6E6E78;margin:0 0 14px;line-height:1.5">Version <b>${esc(c.model_version || '–')}</b>${c.synthetic ? ' · <span style="color:#C98A1E">synthetic data</span>' : ''} · ${c.trustworthy ? '<span style="color:#0E8C5A">display-validated</span>' : '<span style="color:#C98A1E">below display threshold</span>'}</p>`;
  const tbl = (rowsArr) => `<table style="width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11.5px">${rowsArr}</table>`;
  h += tbl(`<tr style="color:#9C9CA6;text-align:right"><th style="text-align:left;padding:4px 8px">head</th><th style="padding:4px 8px">n</th><th style="padding:4px 8px">base</th><th style="padding:4px 8px">Brier</th><th style="padding:4px 8px">AP</th><th style="padding:4px 8px">prec@5</th></tr>` +
    [['pop', pop], ['safe', safe]].map(([k, m]) => `<tr style="text-align:right;border-top:1px solid #EEECE5"><td style="text-align:left;padding:5px 8px;color:#17171C">${k}</td><td style="padding:5px 8px">${m.n ?? '–'}</td><td style="padding:5px 8px">${m.base_rate != null ? (m.base_rate * 100).toFixed(1) + '%' : '–'}</td><td style="padding:5px 8px">${m.brier ?? '–'}</td><td style="padding:5px 8px">${m.average_precision ?? '–'}</td><td style="padding:5px 8px">${m.precision_at_k ? (m.precision_at_k['5'] ?? '–') : '–'}</td></tr>`).join(''));
  if (pop.reliability && pop.reliability.length) {
    h += `<h4 style="margin:16px 0 6px;font-size:13px">Reliability — P(pop) predicted vs observed</h4>` + tbl(`<tr style="color:#9C9CA6;text-align:right"><th style="text-align:left;padding:4px 8px">bin</th><th style="padding:4px 8px">predicted</th><th style="padding:4px 8px">observed</th><th style="padding:4px 8px">n</th></tr>` + pop.reliability.map(b => `<tr style="text-align:right;border-top:1px solid #EEECE5"><td style="text-align:left;padding:5px 8px">${esc(b.bin)}</td><td style="padding:5px 8px">${(b.predicted * 100).toFixed(1)}%</td><td style="padding:5px 8px">${(b.observed * 100).toFixed(1)}%</td><td style="padding:5px 8px">${b.n}</td></tr>`).join(''));
  }
  if (c.feature_skew_note) h += `<p style="font-size:11px;color:#A9A8A0;margin-top:14px;line-height:1.5">${esc(c.feature_skew_note)}</p>`;
  openModal(h);
}
function analystModal(sym) {
  openModal(`<h3 style="margin:0 0 10px;font-size:16px">Analyst note · ${esc(sym)}</h3><div id="mc" style="color:#6E6E78;font-size:13px">writing…</div>`);
  fetch(API + '/api/analyst/' + sym).then(r => r.json()).then(d => {
    const el = document.getElementById('mc'); if (!el) return;
    if (!d.available) { el.innerHTML = esc(d.reason || 'analyst notes disabled'); return; }
    const cav = (d.caveats || []).map(x => `<div style="color:#C98A1E;font-size:12px;margin-top:8px">⚠ ${esc(x)}</div>`).join('');
    const flag = d.flagged ? `<div style="color:#C98A1E;font-size:12px;margin-top:8px">⚠ A figure in this note could not be matched to source stats.</div>` : '';
    const news = (d.news || []).length ? `<div style="margin-top:12px;border-top:1px solid #EEECE5;padding-top:10px">${d.news.map(n => `<a href="${esc(n.url)}" target="_blank" rel="noopener" style="display:block;color:#6E6E78;font-size:12px;text-decoration:none;padding:3px 0">${esc(n.title)} — <span style="color:#9C9CA6">${esc(n.publisher)}</span></a>`).join('')}</div>` : '';
    el.innerHTML = `<div style="color:#17171C;font-size:13.5px;line-height:1.6">${esc(d.note)}</div>${cav}${flag}${news}`;
  }).catch(() => { const el = document.getElementById('mc'); if (el) el.textContent = 'analyst service unavailable'; });
}
function historyModal(sym) {
  openModal(`<h3 style="margin:0 0 10px;font-size:16px">Real historical record · ${esc(sym)}</h3><div id="mc" style="color:#6E6E78;font-size:13px">computing…</div>`);
  fetch(API + '/api/likelihood/' + sym).then(r => r.json()).then(d => {
    const el = document.getElementById('mc'); if (!el) return;
    if (d.error) { el.innerHTML = 'No real history yet.<br>' + esc(d.error); return; }
    if (!d.n) { el.innerHTML = 'No comparable historical setups for ' + esc(sym) + '.'; return; }
    const thin = d.n < 12;
    el.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
      <div><div style="font-size:10.5px;color:#9C9CA6;text-transform:uppercase">Hit +${d.target_pct}% in ${d.horizon_days}d</div><div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:${d.freq_target >= 20 ? '#11A06B' : '#17171C'}">${d.freq_target == null ? '–' : d.freq_target + '%'}</div><div style="font-size:11px;color:${thin ? '#C98A1E' : '#9C9CA6'}">n = ${d.n}${thin ? ' · thin' : ''}</div></div>
      <div><div style="font-size:10.5px;color:#9C9CA6;text-transform:uppercase">Median fwd</div><div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:${d.median_fwd > 0 ? '#11A06B' : '#E0504F'}">${d.median_fwd > 0 ? '+' : ''}${d.median_fwd}%</div><div style="font-size:11px;color:#9C9CA6">${d.p25_fwd}% to ${d.p75_fwd}%</div></div>
      <div><div style="font-size:10.5px;color:#9C9CA6;text-transform:uppercase">Round-trip ≤3wk</div><div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700">${d.recover_rate == null ? '–' : d.recover_rate + '%'}</div><div style="font-size:11px;color:#9C9CA6">of cases that dipped</div></div>
    </div><p style="font-size:11.5px;color:#A9A8A0;margin-top:14px;line-height:1.5">Across ${d.n} past days where ${esc(sym)} looked like it does now — an empirical frequency, not a forecast. The model estimate is checked against this.</p>`;
  }).catch(() => { const el = document.getElementById('mc'); if (el) el.textContent = 'history service unavailable'; });
}

// ============================ events ============================
document.addEventListener('click', e => {
  const t = e.target.closest('[data-act]'); if (!t) return;
  const act = t.dataset.act, id = t.dataset.id;
  switch (act) {
    case 'go': S.view = t.dataset.v; renderShell(); break;
    case 'trust': trustModal(); break;
    case 'select': S.selectedId = id; renderView(); break;
    case 'selectGo': S.view = 'scanner'; S.selectedId = id; renderShell(); break;
    case 'watch': e.stopPropagation(); toggleWatch(id); renderView(); break;
    case 'watchF': toggleWatch(id); renderView(); break;
    case 'unwatch': toggleWatch(id); renderView(); break;
    case 'arm': armTrade(id, t); break;
    case 'close': closePos(id); break;
    case 'resetPaper': if (confirm('Reset the paper account?')) fetch(API + '/api/paper/reset', { method: 'POST' }).then(loadPortfolio); break;
    case 'analyst': analystModal(id); break;
    case 'history': historyModal(id); break;
    case 'toggleAlert': { const i = +t.dataset.i; S.alerts = S.alerts.map((x, j) => j === i ? { ...x, armed: !x.armed, triggered: false } : x); saveAlerts(); renderView(); break; }
    case 'removeAlert': { const i = +t.dataset.i; S.alerts = S.alerts.filter((_, j) => j !== i); saveAlerts(); renderView(); break; }
    case 'addAlert': addAlert(); break;
  }
});
document.addEventListener('change', e => {
  const t = e.target.closest('[data-act]'); if (!t) return;
  if (t.dataset.act === 'formStock') S.form.stock = t.value;
  else if (t.dataset.act === 'formType') { S.form.type = t.value; const fm = document.getElementById('alertForm'); if (fm) fm.innerHTML = alertFormHTML(); }
});
document.addEventListener('input', e => { const t = e.target.closest('[data-act]'); if (t && t.dataset.act === 'formValue') S.form.value = t.value; });

function toggleWatch(id) { S.watch = S.watch.includes(id) ? S.watch.filter(x => x !== id) : [...S.watch, id]; saveWatch(); }
function addAlert() {
  const v = parseFloat(S.form.value), sym = S.form.stock || (S.rows[0] && S.rows[0].symbol);
  if (!sym || isNaN(v)) return;
  S.alerts = [...S.alerts, { stock: sym, type: S.form.type, value: v, armed: true, triggered: false }]; saveAlerts(); S.form.value = ''; renderView();
}
function armTrade(sym, btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'arming…'; }
  fetch(API + '/api/paper/arm', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ symbol: sym }) })
    .then(r => r.json()).then(res => {
      if (!res.ok) pushToast('Could not arm ' + sym, res.error || 'unknown error');
      else { pushToast('Armed paper trade · ' + sym, 'Entry $' + res.position.entry_price.toFixed(2) + ' · target +10% · stop −5%'); loadPortfolio(); }
      if (S.view === 'scanner') renderView();
    }).catch(() => { pushToast('Arm failed', 'Is the backend running?'); if (S.view === 'scanner') renderView(); });
}
function closePos(sym) { fetch(API + '/api/paper/close/' + sym, { method: 'POST' }).then(loadPortfolio); }

// ============================ boot ============================
function connect() {
  let ws;
  try { ws = new WebSocket(WS); } catch (e) { return poll(); }
  ws.onmessage = ev => { try { ingest(JSON.parse(ev.data)); } catch (e) {} };
  ws.onclose = () => setTimeout(connect, 2500);
  ws.onerror = () => { try { ws.close(); } catch (e) {} };
}
function poll() {
  fetch(API + '/api/leaderboard').then(r => r.json()).then(ingest).catch(() => {});
  setTimeout(poll, 3000);
}
S.clock = new Date().toLocaleTimeString('en-US', { hour12: false });
renderShell();
loadCalib(); setInterval(loadCalib, 60000);
loadPortfolio(); setInterval(loadPortfolio, 5000);
connect();
// REST fallback kick in case WS never connects
fetch(API + '/api/leaderboard').then(r => r.json()).then(d => { if (!S.payload.ts) ingest(d); }).catch(() => {});
setInterval(() => {
  S.clock = new Date().toLocaleTimeString('en-US', { hour12: false });
  const c = document.getElementById('clock'); if (c) c.textContent = S.clock;
}, 1000);
window.addEventListener('resize', () => { if (S.view === 'scanner') mountTV(); });
</script>
