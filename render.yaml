# Render blueprint — one-click deploy of the live Tide backend + wired dashboard.
# https://render.com  →  New  →  Blueprint  →  point at this repo. Free tier works.
# The trained model (backend/.model/model.joblib) is committed so the service has
# it. After deploy, set the two secret env vars (POLYGON_API_KEY, ANTHROPIC_API_KEY)
# in the Render dashboard — until POLYGON_API_KEY is set the app falls back to mock
# (probabilities suppressed); once set it serves real, calibrated signals.
services:
  - type: web
    name: tide
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATA_PROVIDER
        value: polygon        # falls back to mock automatically if no key is set
      - key: UNIVERSE_LIMIT
        value: "150"          # modest scan for the free tier's CPU/RAM
      - key: TOP_N
        value: "5"
      - key: SAFE_THRESHOLD
        value: "0.40"
      - key: SAFE_BUFFER
        value: "0.05"
      - key: ANALYST_MODEL
        value: claude-opus-4-8
      - key: POLYGON_API_KEY
        sync: false           # set in dashboard → enables real data
      - key: ANTHROPIC_API_KEY
        sync: false           # set in dashboard → enables analyst notes
